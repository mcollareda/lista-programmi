<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUB - Portafoglio Progetti</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --primary: #3a73d8;      /* Blu HUB */
      --primary-dark: #3c364c; /* Viola HUB */
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 60px 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 1px; }
    .header p { opacity: 0.9; font-size: 1.1rem; margin-top: 10px; }

    .container {
      max-width: 1100px;
      margin: -40px auto 40px;
      padding: 0 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .repo-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
    }

    .repo-card:hover { transform: translateY(-5px); }

    .repo-card h3 {
      margin: 0 0 12px 0;
      color: var(--primary);
      text-transform: uppercase;
      font-size: 1.2rem;
    }

    .repo-card p {
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.5;
      flex-grow: 1;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .btn-primary { background: var(--primary); color: white; margin-bottom: 8px; }
    .btn-secondary { background: #f0f4fc; color: var(--primary); border: 1px solid var(--primary); }
    .btn:hover { opacity: 0.85; }

    .loader { text-align: center; padding: 50px; font-weight: bold; color: var(--primary); }
  </style>
</head>
<body>

  <div class="header">
    <h1>HUB PROJECT CENTER</h1>
    <p>Raccolta delle applicazioni e strumenti di ingegneria</p>
  </div>

  <div class="container">
    <div id="loader" class="loader">Caricamento progetti in corso...</div>
    <div id="repo-grid" class="grid"></div>
  </div>

  <script>
    // --- CONFIGURAZIONE ---
    const GITHUB_USER = 'mcollareda'; // <--- Sostituisci con il tuo username GitHub

    async function fetchRepos() {
      const grid = document.getElementById('repo-grid');
      const loader = document.getElementById('loader');
      
      try {
        const response = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated`);
        const repos = await response.json();
        
        loader.style.display = 'none';

        repos.forEach(repo => {
          // Mostra solo le repo che hanno GitHub Pages attivo o un URL homepage
          if (repo.has_pages || repo.homepage) {
            const card = document.createElement('div');
            card.className = 'repo-card';
            
            const homepageUrl = repo.homepage || `https://${GITHUB_USER}.github.io/${repo.name}/`;
            
            card.innerHTML = `
              <h3>${repo.name.replace(/-/g, ' ')}</h3>
              <p>${repo.description || 'Strumento per la gestione e l\'analisi tecnica dei processi di ingegneria.'}</p>
              <a href="${homepageUrl}" class="btn btn-primary" target="_blank">Apri Applicazione</a>
              <a href="${repo.html_url}" class="btn btn-secondary" target="_blank">Visualizza Codice</a>
            `;
            grid.appendChild(card);
          }
        });
      } catch (error) {
        loader.textContent = "Errore nel caricamento dei progetti.";
        console.error(error);
      }
    }

    fetchRepos();
  </script>
</body>
</html>
